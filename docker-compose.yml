version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
          condition: service_healthy
      redis:
        condition: service_started
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=Quality;Username=postgres;Password=1234
      - Redis__Connection=redis:6379

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: Quality
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"